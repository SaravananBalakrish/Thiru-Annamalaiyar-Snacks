name: thiru_annamalaiyar_snacks
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.10.8 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1
  google_fonts: ^6.1.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  uuid: ^4.5.3
  intl: ^0.20.2
  http: ^1.6.0
  flutter_secure_storage: ^9.2.4
  permission_handler: ^11.3.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_map: ^8.0.0
  latlong2: ^0.10.1
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  built_collection: ^5.1.1
  built_value: 8.12.0
  dio: ^5.7.0
  one_of: ^1.5.0
  one_of_serializer: ^1.5.0
  e_shop_api:
    path: ./lib/generated/api

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  built_value_generator: 8.12.0

  flutter_lints: ^6.0.0

